# Test, lint, type-check, and format-check on every push and PR.
name: ci

on:
  push:
    branches: [main]
  pull_request: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --with pyyaml python3 tests/run_tests.py
      - run: uvx ruff==0.16.0 check directory tests build_directory.py
      - run: uvx ruff==0.16.0 format --check directory tests build_directory.py
      - run: uvx --with pyyaml ty==0.0.63 check directory build_directory.py
